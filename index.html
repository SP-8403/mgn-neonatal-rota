<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MGN Neonatal Day Allocation Agent</title>

<style>
body{
font-family: Arial, Helvetica, sans-serif;
margin:40px;
background:#f5f7fb;
}

h1{
color:#1c3d5a;
}

button{
padding:12px 20px;
background:#1f6feb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

table{
margin-top:30px;
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#1f6feb;
color:white;
}
</style>

</head>

<body>

<h1>MGN Neonatal Day Allocation Agent</h1>

<button onclick="runAgent()">Generate Allocation (16–20 March)</button>

<div id="rota"></div>

<script>

const rotaURL =
"https://opensheet.elk.sh/1Ls5CWX7njmL6GQ5iz78R3-_RaP9ge7LUTDkYmZUfU0w/March%202026"

const staffURL =
"https://opensheet.elk.sh/1Ls5CWX7njmL6GQ5iz78R3-_RaP9ge7LUTDkYmZUfU0w/MGN%20Staff"

const seniorRegistrars = ["Chinelo","Naa"]

const registrars = [
"Brent",
"Waynne",
"Herlinde"
]

const medicalOfficers = [
"Shannon",
"Sanam"
]

const interns = [
"Lezaro",
"Mashudu",
"Elvira",
"Mehreen",
"Nishoka",
"LeeAnne"
]

function firstName(name){
return name.split(" ")[0]
}

function splitCell(cell){
if(!cell) return []
return cell.split("/").map(x=>x.trim())
}

async function runAgent(){

document.getElementById("rota").innerHTML="Loading..."

let rotaData = await fetch(rotaURL).then(r=>r.json())
let staffData = await fetch(staffURL).then(r=>r.json())

let staffList = staffData.map(x=>x["Name and Surname"].split(" ")[0])

let targetDates = [
"16/03/2026",
"17/03/2026",
"18/03/2026",
"19/03/2026",
"20/03/2026"
]

let weekRows = rotaData.filter(r => targetDates.includes(r.Date))

let sundayRow = rotaData.find(r => r.Date==="15/03/2026")

let onCall = {}

function extractOnCall(row){

let names=[]

names = names.concat(splitCell(row["Registrar On call"]||""))
names = names.concat(splitCell(row["Intern On call"]||""))
names = names.concat(splitCell(row["Medical Officer on call"]||""))

names = names.map(firstName)

names = names.filter(n => staffList.includes(n))

return names
}

onCall["Monday"] = extractOnCall(sundayRow)

weekRows.forEach(r=>{
onCall[r.Day]=extractOnCall(r)
})

let postCall={}

let days=["Monday","Tuesday","Wednesday","Thursday","Friday"]

days.forEach((d,i)=>{

if(i===0){
postCall[d]=onCall["Monday"]
}else{
postCall[d]=onCall[days[i]]
}

})

displayTable(postCall)

}

function allocateDay(day,postCall){

let available=[
...seniorRegistrars,
...registrars,
...medicalOfficers,
...interns
]

available=available.filter(x=>!postCall[day].includes(x))

let areas={
"ICU 1":[],
"ICU 2":[],
"High Care":[],
"Pre-KMC / KMC":[],
"Theatre":[],
"Theatre Cover":[],
"Post-Nates":[]
}

let icu1=available.find(x=>seniorRegistrars.includes(x)||registrars.includes(x))
areas["ICU 1"]=[icu1]
available=available.filter(x=>x!==icu1)

let icu2=available.find(x=>registrars.includes(x)||medicalOfficers.includes(x))
areas["ICU 2"]=[icu2]
available=available.filter(x=>x!==icu2)

let highcare=available.find(x=>medicalOfficers.includes(x))
areas["High Care"]=[highcare]
available=available.filter(x=>x!==highcare)

let kmc=available.find(x=>interns.includes(x)||medicalOfficers.includes(x))
areas["Pre-KMC / KMC"]=[kmc]
available=available.filter(x=>x!==kmc)

let theatre=available.find(x=>interns.includes(x)||medicalOfficers.includes(x))
areas["Theatre"]=[theatre]
available=available.filter(x=>x!==theatre)

areas["Theatre Cover"]=[icu2]

areas["Post-Nates"]=available

return areas
}

function displayTable(postCall){

let areas=[
"ICU 1",
"ICU 2",
"High Care",
"Pre-KMC / KMC",
"Theatre",
"Theatre Cover",
"Post-Nates",
"Post-Call"
]

let days=["Monday","Tuesday","Wednesday","Thursday","Friday"]

let html="<table>"

html+="<tr><th>Area</th>"

days.forEach(d=>html+="<th>"+d+"</th>")

html+="</tr>"

areas.forEach(area=>{

html+="<tr>"
html+="<td>"+area+"</td>"

days.forEach(day=>{

if(area==="Post-Call"){

html+="<td>"+postCall[day].join(" & ")+"</td>"

}else{

let alloc=allocateDay(day,postCall)

html+="<td>"+(alloc[area]||[]).join(" & ")+"</td>"

}

})

html+="</tr>"

})

html+="</table>"

document.getElementById("rota").innerHTML=html

}

</script>

</body>
</html>
