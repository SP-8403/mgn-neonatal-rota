<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MGN Neonatal Day Allocation Agent</title>

<style>

body{
font-family: Arial;
margin:40px;
background:#f5f7fb;
}

button{
padding:12px 20px;
background:#1f6feb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
margin-top:30px;
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#1f6feb;
color:white;
}

.postcall{
background:#ffdddd;
color:#b00000;
font-weight:bold;
}

.editable{
background:#fffef2;
}

</style>
</head>

<body>

<h1>MGN Neonatal Day Allocation Agent</h1>

<button onclick="runAgent()">Generate Allocation</button>

<div id="rota"></div>

<script>

const rotaURL =
"https://docs.google.com/spreadsheets/d/1Ls5CWX7njmL6GQ5iz78R3-_RaP9ge7LUTDkYmZUfU0w/export?format=csv&gid=917931031"

function parseCSV(text){

let rows = text.trim().split("\n")
let headers = rows[0].split(",")

return rows.slice(1).map(r => {

let vals = r.split(",")

let obj = {}

headers.forEach((h,i)=>{
obj[h.trim()] = vals[i]
})

return obj

})

}

function firstName(name){
if(!name) return ""
return name.split(" ")[0]
}

function splitCell(cell){

if(!cell) return []

if(cell.includes("/")){
return cell.split("/").map(x=>x.trim())
}

return [cell.trim()]

}

async function runAgent(){

document.getElementById("rota").innerHTML="Loading..."

let rotaCSV = await fetch(rotaURL).then(r=>r.text())

let rotaData = parseCSV(rotaCSV)

let days=["Monday","Tuesday","Wednesday","Thursday","Friday"]

let week = rotaData.filter(r=>days.includes(r.Day))

let sunday = rotaData.find(r=>r.Day==="Sunday")

function extract(row){

let names=[]

names=names.concat(splitCell(row["Registrar On call"]))
names=names.concat(splitCell(row["Intern on call"]))
names=names.concat(splitCell(row["Medical Officer on call"]))

return names.map(firstName)

}

let onCall={}

onCall["Monday"]=extract(sunday)

week.forEach(r=>{
onCall[r.Day]=extract(r)
})

let postCall={}

days.forEach((d,i)=>{

if(i===0){
postCall[d]=onCall["Monday"]
}else{
postCall[d]=onCall[days[i]]
}

})

renderTable(onCall,postCall)

}

function renderTable(onCall,postCall){

let areas=[
"ICU 1",
"ICU 2",
"High Care",
"Pre-KMC / KMC",
"Theatre",
"Theatre Cover",
"Post-Nates",
"Post-Call",
"On-Call"
]

let days=["Monday","Tuesday","Wednesday","Thursday","Friday"]

let html="<table>"

html+="<tr><th>Area</th>"

days.forEach(d=>html+="<th>"+d+"</th>")

html+="</tr>"

areas.forEach(area=>{

html+="<tr>"
html+="<td>"+area+"</td>"

days.forEach(day=>{

if(area==="Post-Call"){

html+="<td class='postcall'>"+(postCall[day]||[]).join(" & ")+"</td>"

}
else if(area==="On-Call"){

html+="<td>"+(onCall[day]||[]).join(" & ")+"</td>"

}
else{

html+="<td class='editable' contenteditable='true'></td>"

}

})

html+="</tr>"

})

html+="</table>"

document.getElementById("rota").innerHTML=html

}

</script>

</body>
</html>
